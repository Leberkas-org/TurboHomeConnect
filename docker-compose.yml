services:
  dashboard:
    build:
      context: .
      dockerfile: samples/TurboHomeConnect.BlazorSample/Dockerfile
    image: turbo-home-connect-dashboard:latest
    container_name: turbo-home-connect-dashboard
    env_file:
      - .env
    # 5099 = Blazor UI + OAuth callback.
    ports:
      - "5099:5099"
    volumes:
      - ./.tokens:/data
    stdin_open: true
    tty: true
    restart: "no"
