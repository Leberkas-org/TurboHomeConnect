services:
  dashboard:
    build:
      context: .
      dockerfile: samples/TurboHomeConnect.BlazorSample/Dockerfile
    image: turbo-home-connect-dashboard:latest
    container_name: turbo-home-connect-dashboard
    env_file:
      - .env
    # 5099 = Blazor UI (open this in your browser).
    # 7878 = OAuth callback (only used on first-time auth, before a token is cached).
    ports:
      - "5099:5099"
      - "7878:7878"
    volumes:
      - ./.tokens:/data
    stdin_open: true
    tty: true
    restart: "no"
